<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>projects — ariworks_</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Onest:wght@300;400;500&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing:border-box;margin:0;padding:0; }
    :root {
      --bg:#0d0c10;--bg2:#131118;--surface:#1f1d2e;
      --border:rgba(255,255,255,0.07);--text:#e8e4f0;--muted:#7a748f;
      --accent1:#ff6b6b;--accent2:#ffca3a;--accent3:#6bcfff;--accent4:#b06bff;--accent5:#6bffb0;
      --glow2:rgba(255,202,58,0.18);
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Onest',sans-serif;font-weight:300;overflow-x:hidden;cursor:none;min-height:100vh;}
    #cursor{position:fixed;z-index:9999;width:12px;height:12px;background:var(--accent2);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);transition:width .15s,height .15s;mix-blend-mode:difference;}
    #cursor-ring{position:fixed;z-index:9998;width:36px;height:36px;border:1.5px solid var(--accent2);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);transition:width .35s cubic-bezier(.23,1,.32,1),height .35s cubic-bezier(.23,1,.32,1),opacity .3s;opacity:.5;}
    body:hover #cursor-ring{opacity:1}
    #starfield{position:fixed;inset:0;z-index:0;pointer-events:none;}
    body::after{content:'';position:fixed;inset:0;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;opacity:.35;}
    nav{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(19,17,24,0.75);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:999px;padding:10px 28px;display:flex;align-items:center;gap:32px;animation:navDrop .6s cubic-bezier(.23,1,.32,1) both;white-space:nowrap;}
    @keyframes navDrop{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;letter-spacing:-0.03em;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px;}
    .nav-logo .logo-icon{display:inline-flex;gap:2px;}
    .nav-logo .logo-icon span{display:inline-block;width:7px;height:7px;border-radius:2px;background:var(--accent2);animation:cubeWiggle 3s ease-in-out infinite;}
    .nav-logo .logo-icon span:nth-child(2){animation-delay:.2s;background:var(--accent1)}
    .nav-logo .logo-icon span:nth-child(3){animation-delay:.4s;background:var(--accent3)}
    @keyframes cubeWiggle{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    .nav-links{display:flex;gap:24px;list-style:none;}
    .nav-links a{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--muted);text-decoration:none;transition:color .2s;letter-spacing:.02em;}
    .nav-links a:hover,.nav-links a.active{color:var(--text)}

    /* page header */
    .page{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:140px 24px 120px;}
    .page-eyebrow{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent3);margin-bottom:16px;display:flex;align-items:center;gap:12px;opacity:0;animation:fadeUp .7s .2s forwards;}
    .page-eyebrow::before{content:'';display:inline-block;width:28px;height:1px;background:var(--accent3);}
    .page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(3rem,8vw,6rem);letter-spacing:-0.04em;line-height:.95;margin-bottom:16px;opacity:0;animation:fadeUp .8s .35s forwards;}
    .page-title span{color:var(--accent3)}
    .page-sub{color:var(--muted);font-size:1.05rem;line-height:1.65;max-width:520px;margin-bottom:72px;opacity:0;animation:fadeUp .8s .5s forwards;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    /* projects grid */
    .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;}
    .project-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:32px;position:relative;overflow:hidden;cursor:none;transition:transform .3s cubic-bezier(.23,1,.32,1),border-color .3s;text-decoration:none;color:inherit;display:block;}
    .project-card:hover{transform:translateY(-6px);border-color:rgba(255,255,255,0.15);}
    .project-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 70% -20%,var(--card-glow,rgba(107,207,255,0.08)),transparent 65%);pointer-events:none;}
    .card-banner{width:100%;height:160px;border-radius:10px;object-fit:cover;margin-bottom:20px;background:var(--bg2);display:block;}
    .card-banner-placeholder{width:100%;height:160px;border-radius:10px;margin-bottom:20px;background:linear-gradient(135deg,#1a1228,#0f1a2e);display:flex;align-items:center;justify-content:center;}
    .card-banner-placeholder span{font-size:2rem;opacity:.3;}
    .project-tag{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--card-accent,var(--accent3));background:rgba(255,255,255,.05);border-radius:999px;padding:4px 12px;display:inline-block;margin-bottom:14px;}
    .project-card h3{font-family:'Syne',sans-serif;font-weight:700;font-size:1.4rem;letter-spacing:-.02em;margin-bottom:10px;}
    .project-card p{color:var(--muted);font-size:.92rem;line-height:1.6;margin-bottom:20px;}
    .card-footer{display:flex;align-items:center;justify-content:space-between;}
    .wip{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;background:rgba(255,107,107,.15);color:var(--accent1);border:1px solid rgba(255,107,107,.3);padding:3px 10px;border-radius:999px;}
    .card-arrow{font-size:1.1rem;color:var(--muted);transition:transform .3s,color .3s;}
    .project-card:hover .card-arrow{transform:translate(3px,-3px);color:var(--card-accent,var(--accent3));}
    .skeleton{background:linear-gradient(90deg,var(--surface) 25%,rgba(255,255,255,.04) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:18px;}
    @keyframes shimmer{to{background-position:-200% 0}}
    .reveal{opacity:0;transform:translateY(24px);transition:opacity .7s cubic-bezier(.23,1,.32,1),transform .7s cubic-bezier(.23,1,.32,1);}
    .reveal.visible{opacity:1;transform:none;}

    footer{position:relative;z-index:2;background:var(--bg);border-top:1px solid var(--border);padding:48px 24px;text-align:center;}
    .footer-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;letter-spacing:-.04em;margin-bottom:8px;}
    .footer-logo span{color:var(--accent2)}
    .footer-copy{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;color:var(--muted);opacity:.5;}
    @media(max-width:640px){nav{padding:10px 18px;gap:18px}.nav-links{gap:14px}}
  </style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="starfield"></canvas>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="logo-icon"><span></span><span></span><span></span></span>
    ariworks_
  </a>
  <ul class="nav-links">
    <li><a href="projects.html" class="active">projects</a></li>
    <li><a href="team.html">team</a></li>
    <li><a href="blogs.html">blogs</a></li>
    <li><a href="contact.html">contact</a></li>
  </ul>
</nav>

<main class="page">
  <p class="page-eyebrow">what we're building</p>
  <h1 class="page-title">our <span>projects.</span></h1>
  <p class="page-sub">a mix of games, engines, and little tools we build because we think they should exist.</p>
  <div class="projects-grid" id="projects-grid">
    <div class="skeleton" style="height:340px"></div>
    <div class="skeleton" style="height:340px"></div>
    <div class="skeleton" style="height:340px"></div>
  </div>
</main>

<footer>
  <div class="footer-logo">ari<span>works</span>_</div>
  <p class="footer-copy">© 2026 ariworks_ — all rights reserved & vibes preserved</p>
</footer>

<script>
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function anim(){cursor.style.left=mx+'px';cursor.style.top=my+'px';rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim);})();
function bindCursor(el){el.addEventListener('mouseenter',()=>{cursor.style.width='18px';cursor.style.height='18px';ring.style.width='52px';ring.style.height='52px';});el.addEventListener('mouseleave',()=>{cursor.style.width='12px';cursor.style.height='12px';ring.style.width='36px';ring.style.height='36px';});}
document.querySelectorAll('a,button').forEach(bindCursor);
const canvas=document.getElementById('starfield'),ctx=canvas.getContext('2d');
let W,H,stars=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const SC=['#ffffff','#ffe5b4','#6bcfff','#b06bff','#ffca3a'];
const mk=()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.2,c:SC[Math.floor(Math.random()*SC.length)],speed:Math.random()*0.18+0.04,ts:Math.random()*0.02+0.005,to:Math.random()*Math.PI*2,drift:(Math.random()-.5)*0.08});
for(let i=0;i<180;i++)stars.push(mk());
let t=0;
(function draw(){ctx.clearRect(0,0,W,H);t+=0.016;stars.forEach(s=>{const a=0.4+0.6*Math.abs(Math.sin(t*s.ts*60+s.to));ctx.save();ctx.globalAlpha=a;ctx.fillStyle=s.c;ctx.shadowColor=s.c;ctx.shadowBlur=s.r>1?4:0;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();s.y-=s.speed;s.x+=s.drift;if(s.y<-4){s.y=H+4;s.x=Math.random()*W;}});requestAnimationFrame(draw);})();
const ro=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');ro.unobserve(e.target);}}),{threshold:.1});
const PALS=[{glow:'rgba(107,207,255,.1)',accent:'var(--accent3)'},{glow:'rgba(176,107,255,.1)',accent:'var(--accent4)'},{glow:'rgba(107,255,176,.08)',accent:'var(--accent5)'},{glow:'rgba(255,107,107,.1)',accent:'var(--accent1)'},{glow:'rgba(255,202,58,.1)',accent:'var(--accent2)'}];
async function load(){
  const grid=document.getElementById('projects-grid');
  try{
    const data=await fetch('ariworks_project_manifest.json').then(r=>r.json());
    grid.innerHTML='';
    data.projects.forEach((p,i)=>{
      const pal=PALS[i%PALS.length];
      const card=document.createElement('a');
      card.href=p.link||'#';
      card.className='project-card reveal';
      card.style.setProperty('--card-glow',pal.glow);
      card.style.setProperty('--card-accent',pal.accent);
      const bannerHtml=p.banner_image
        ?`<img class="card-banner" src="${p.banner_image}" alt="${p.title}" onerror="this.outerHTML='<div class=\\'card-banner-placeholder\\'><span>✦</span></div>'">`
        :`<div class="card-banner-placeholder"><span>✦</span></div>`;
      card.innerHTML=`${bannerHtml}<span class="project-tag">${p.pill}</span><h3>${p.title}</h3><p>${p.description}</p><div class="card-footer">${p.in_dev?'<span class="wip">in dev</span>':'<span></span>'}<span class="card-arrow">↗</span></div>`;
      grid.appendChild(card);ro.observe(card);bindCursor(card);
    });
  }catch(e){grid.innerHTML='<p style="color:var(--muted);font-size:.9rem">couldn\'t load projects.</p>';}
}
load();
</script>
</body>
</html>
