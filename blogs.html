<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ariworks_ - Blogs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Onest:wght@300;400;500&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
    :root {
      --bg:      #0d0c10;
      --bg2:     #131118;
      --surface: #1f1d2e;
      --border:  rgba(255,255,255,0.07);
      --text:    #e8e4f0;
      --muted:   #7a748f;
      --accent1: #ff6b6b;
      --accent2: #ffca3a;
      --accent3: #6bcfff;
      --accent4: #b06bff;
      --accent5: #6bffb0;
      --glow2:   rgba(255,202,58,0.18);
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Onest', sans-serif; font-weight: 300; overflow-x: hidden; cursor: none; min-height: 100vh; }

    #cursor { position:fixed;z-index:9999;width:12px;height:12px;background:var(--accent2);border-radius:50%;pointer-events:none;top:0;left:0;transition:width .15s,height .15s;mix-blend-mode:difference;will-change:transform; }
    #cursor-ring { position:fixed;z-index:9998;width:36px;height:36px;border:1.5px solid var(--accent2);border-radius:50%;pointer-events:none;top:0;left:0;transition:width .35s cubic-bezier(.23,1,.32,1),height .35s cubic-bezier(.23,1,.32,1),opacity .3s;opacity:0.5;will-change:transform; }
    body:hover #cursor-ring { opacity:1; }
    #starfield { position:fixed;inset:0;z-index:0;pointer-events:none; }
    body::after { content:'';position:fixed;inset:0;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;opacity:0.35; }
    nav { position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(19,17,24,0.75);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:999px;padding:10px 28px;display:flex;align-items:center;gap:32px;animation:navDrop .6s cubic-bezier(.23,1,.32,1) both;white-space:nowrap; }
    @keyframes navDrop { from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)} }
    .nav-logo { font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;letter-spacing:-0.03em;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:8px; }
    .nav-logo .logo-icon { display:inline-flex;gap:2px; }
    .nav-logo .logo-icon span { display:inline-block;width:7px;height:7px;border-radius:2px;background:var(--accent2);animation:cubeWiggle 3s ease-in-out infinite; }
    .nav-logo .logo-icon span:nth-child(2){animation-delay:.2s;background:var(--accent1)}
    .nav-logo .logo-icon span:nth-child(3){animation-delay:.4s;background:var(--accent3)}
    @keyframes cubeWiggle{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    .nav-links { display:flex;gap:24px;list-style:none; }
    .nav-links a { font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--muted);text-decoration:none;transition:color .2s;letter-spacing:0.02em; }
    .nav-links a:hover, .nav-links a.active { color:var(--text); }

    .page { position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:140px 24px 120px; }
    .page-header { margin-bottom:72px; }
    .page-eyebrow { font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent2);margin-bottom:16px;display:flex;align-items:center;gap:12px;opacity:0;animation:fadeUp .7s .2s forwards; }
    .page-eyebrow::before { content:'';display:inline-block;width:28px;height:1px;background:var(--accent2); }
    .page-title { font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(3rem,8vw,6rem);letter-spacing:-0.04em;line-height:0.95;opacity:0;animation:fadeUp .8s .35s forwards; }
    .page-title span { color:var(--accent2); }

    .featured-post { display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-radius:20px;overflow:hidden;text-decoration:none;color:inherit;cursor:none;background:var(--surface);transition:border-color .3s,transform .3s cubic-bezier(.23,1,.32,1);margin-bottom:24px;opacity:0;animation:fadeUp .8s .5s forwards; }
    .featured-post:hover { border-color:rgba(255,255,255,0.18);transform:translateY(-4px); }
    .featured-visual { background:linear-gradient(135deg,#1a1228,#0f1a2e);position:relative;overflow:hidden;min-height:320px;display:flex;align-items:center;justify-content:center; }
    .featured-visual .vis-glow { position:absolute;inset:0;background:radial-gradient(circle at 60% 40%,rgba(107,207,255,0.18),transparent 65%); }
    .featured-visual .vis-tag { font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent3);border:1px solid rgba(107,207,255,0.3);border-radius:999px;padding:5px 14px;position:relative;z-index:1; }
    .featured-badge { position:absolute;top:20px;left:20px;font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;background:var(--accent2);color:#0d0c10;padding:4px 12px;border-radius:999px;font-weight:500;z-index:2; }
    .featured-content { padding:48px 44px;display:flex;flex-direction:column;justify-content:center; }
    .featured-date { font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);letter-spacing:0.08em;margin-bottom:16px; }
    .featured-title { font-family:'Syne',sans-serif;font-weight:700;font-size:clamp(1.4rem,2.5vw,2rem);letter-spacing:-0.02em;line-height:1.15;margin-bottom:16px; }
    .featured-desc { color:var(--muted);font-size:0.95rem;line-height:1.65;margin-bottom:28px; }
    .featured-read { font-family:'DM Mono',monospace;font-size:0.75rem;letter-spacing:0.08em;color:var(--accent2);display:inline-flex;align-items:center;gap:8px;transition:gap .2s; }
    .featured-post:hover .featured-read { gap:14px; }

    .posts-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px; }
    .post-card { background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:30px;position:relative;overflow:hidden;cursor:none;transition:transform .3s cubic-bezier(.23,1,.32,1),border-color .3s;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:12px; }
    .post-card:hover { transform:translateY(-5px);border-color:rgba(255,255,255,0.14); }
    .post-card::before { content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% -10%,var(--card-glow,rgba(176,107,255,0.07)),transparent 60%);pointer-events:none; }
    .post-meta { display:flex;align-items:center;gap:10px;flex-wrap:wrap; }
    .post-tag { font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--card-accent,var(--accent4));background:rgba(255,255,255,0.05);border-radius:999px;padding:3px 11px; }
    .post-date { font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--muted);letter-spacing:0.05em; }
    .post-title { font-family:'Syne',sans-serif;font-weight:700;font-size:1.15rem;letter-spacing:-0.02em;line-height:1.25; }
    .post-desc { color:var(--muted);font-size:0.88rem;line-height:1.6;flex:1; }
    .post-arrow { font-size:1rem;color:var(--muted);align-self:flex-end;transition:transform .3s,color .3s; }
    .post-card:hover .post-arrow { transform:translate(3px,-3px);color:var(--card-accent,var(--accent4)); }
    .empty { color:var(--muted);font-size:0.9rem;font-family:'DM Mono',monospace;padding:40px 0; }
    .skeleton { background:linear-gradient(90deg,var(--surface) 25%,rgba(255,255,255,0.04) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:18px; }
    @keyframes shimmer{to{background-position:-200% 0}}
    .reveal { opacity:0;transform:translateY(24px);transition:opacity .7s cubic-bezier(.23,1,.32,1),transform .7s cubic-bezier(.23,1,.32,1); }
    .reveal.visible { opacity:1;transform:none; }
    .reveal-delay-1{transition-delay:.1s}.reveal-delay-2{transition-delay:.2s}.reveal-delay-3{transition-delay:.3s}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    /* ── FOOTER (limeko style) ── */
    footer { position:relative;z-index:2;background:var(--bg);border-top:1px solid var(--border);padding:64px 24px;text-align:center; }
    .footer-logo { font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;letter-spacing:-0.04em;margin-bottom:6px; }
    .footer-logo .t-yellow{color:var(--accent2)}
    .footer-logo .t-coral{color:var(--accent1)}
    .footer-logo .t-blue{color:var(--accent3)}
    .footer-sub { font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:32px;display:block;text-align:center;width:100%; }
    .footer-links { display:flex;justify-content:center;gap:28px;list-style:none;margin-bottom:40px;flex-wrap:wrap; }
    .footer-links a { font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.08em;color:rgba(255,255,255,.35);text-decoration:none;transition:color .2s; }
    .footer-links a:hover { color:var(--text) }
    .footer-divider { width:48px;height:1px;background:rgba(255,255,255,.08);margin:0 auto 32px; }
    .footer-copy { font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;color:rgba(255,255,255,.2);display:block;text-align:center;width:100%; }

    @media(max-width:720px){
      .featured-post{grid-template-columns:1fr}
      .featured-visual{min-height:180px}
      .featured-content{padding:30px 26px}
      nav{padding:10px 18px;gap:18px}
      .nav-links{gap:14px}
    }
  </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="starfield"></canvas>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="logo-icon"><span></span><span></span><span></span></span>
    ariworks_
  </a>
  <ul class="nav-links">
    <li><a href="projects.html">projects</a></li>
    <li><a href="team.html">crew</a></li>
    <li><a href="blogs.html" class="active">blogs</a></li>
    <li><a href="contact.html">contact</a></li>
  </ul>
</nav>

<main class="page">
  <header class="page-header">
    <p class="page-eyebrow">thoughts from the crew</p>
    <h1 class="page-title">the <span>blog.</span></h1>
  </header>
  <div id="featured-slot"></div>
  <div class="posts-grid" id="posts-grid">
    <div class="skeleton" style="height:200px"></div>
    <div class="skeleton" style="height:200px"></div>
  </div>
</main>

<footer>
  <div class="footer-logo">
    <span class="t-yellow">ari</span><span class="t-coral">wor</span><span class="t-blue">ks_</span>
  </div>
  <ul class="footer-links">
    <li><a href="index.html">home</a></li>
    <li><a href="https://github.com/Ariworks-Entertainment/">github</a></li>
    <!-- <li><a href="#">twitter</a></li> -->
    <li><a href="https://discord.gg/ADW466aatQ/">discord</a></li>
    <li><a href="mailto:contact@ariworks.xyz">email</a></li>
    <li><a href="https://ko-fi.com/ariworks_entertainment">ko-fi</a></li>
  </ul>
  <div class="footer-divider"></div>
  <span class="footer-copy">© 2026 ariworks_ — all rights reserved</span>
</footer>

<script>
const cursor=document.getElementById('cursor'), ring=document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function anim(){cursor.style.transform=`translate(${mx}px,${my}px) translate(-50%,-50%)`;rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.transform=`translate(${rx}px,${ry}px) translate(-50%,-50%)`;requestAnimationFrame(anim);})();
function bindCursor(el){el.addEventListener('mouseenter',()=>{cursor.style.width='18px';cursor.style.height='18px';ring.style.width='52px';ring.style.height='52px';});el.addEventListener('mouseleave',()=>{cursor.style.width='12px';cursor.style.height='12px';ring.style.width='36px';ring.style.height='36px';});}
document.querySelectorAll('a,button').forEach(bindCursor);
const canvas=document.getElementById('starfield'),ctx=canvas.getContext('2d');
let W,H,stars=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const SC=['#ffffff','#ffe5b4','#6bcfff','#b06bff','#ffca3a'];
const mk=()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.2,c:SC[Math.floor(Math.random()*SC.length)],speed:Math.random()*0.18+0.04,ts:Math.random()*0.02+0.005,to:Math.random()*Math.PI*2,drift:(Math.random()-.5)*0.08});
for(let i=0;i<180;i++)stars.push(mk());
let t=0;
(function draw(){ctx.clearRect(0,0,W,H);t+=0.016;stars.forEach(s=>{const a=0.4+0.6*Math.abs(Math.sin(t*s.ts*60+s.to));ctx.save();ctx.globalAlpha=a;ctx.fillStyle=s.c;ctx.shadowColor=s.c;ctx.shadowBlur=s.r>1?4:0;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();s.y-=s.speed;s.x+=s.drift;if(s.y<-4){s.y=H+4;s.x=Math.random()*W;}});requestAnimationFrame(draw);})();
const ro=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');ro.unobserve(e.target);}}),{threshold:0.1});
document.querySelectorAll('.reveal').forEach(el=>ro.observe(el));
const PALS=[
  {glow:'rgba(176,107,255,0.08)',accent:'var(--accent4)'},
  {glow:'rgba(107,207,255,0.08)',accent:'var(--accent3)'},
  {glow:'rgba(107,255,176,0.07)',accent:'var(--accent5)'},
  {glow:'rgba(255,107,107,0.08)',accent:'var(--accent1)'},
  {glow:'rgba(255,202,58,0.08)', accent:'var(--accent2)'},
];
async function loadPosts(){
  const featuredSlot=document.getElementById('featured-slot');
  const grid=document.getElementById('posts-grid');
  try {
    const data=await fetch('ariworks_blog_manifest.json').then(r=>r.json());
    const featured=data.posts.find(p=>p.featured);
    const rest=data.posts.filter(p=>!p.featured);
    if(featured){
      const a=document.createElement('a');
      a.href=`Blogs/${featured.file}.html`;
      a.className='featured-post';
      a.innerHTML=`<div class="featured-visual"><div class="vis-glow"></div><span class="featured-badge">✦ featured</span><span class="vis-tag">${featured.tag}</span></div><div class="featured-content"><div class="featured-date">${featured.date}</div><div class="featured-title">${featured.title}</div><div class="featured-desc">${featured.description}</div><span class="featured-read">read post →</span></div>`;
      featuredSlot.appendChild(a);
      bindCursor(a);
    } else {
      featuredSlot.innerHTML='';
    }
    grid.innerHTML='';
    if(rest.length===0){grid.innerHTML='<p class="empty">no more posts yet — check back soon.</p>';return;}
    rest.forEach((p,i)=>{
      const pal=PALS[i%PALS.length];
      const a=document.createElement('a');
      a.href=`Blogs/${p.file}.html`;
      a.className='post-card reveal';
      a.style.setProperty('--card-glow',pal.glow);
      a.style.setProperty('--card-accent',pal.accent);
      a.innerHTML=`<div class="post-meta"><span class="post-tag">${p.tag}</span><span class="post-date">${p.date}</span></div><div class="post-title">${p.title}</div><div class="post-desc">${p.description}</div><span class="post-arrow">↗</span>`;
      grid.appendChild(a);
      ro.observe(a);
      bindCursor(a);
    });
  } catch(e) {
    grid.innerHTML='<p class="empty">couldn\'t load posts — check ariworks_blog_manifest.json</p>';
    console.error(e);
  }
}
loadPosts();
</script>
</body>
</html>
